spring.application.name=betting-api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/betting}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:betting}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devpass}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

server.port=8080
